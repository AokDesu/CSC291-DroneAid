name: Build agent-log index

on:
  push:
    branches: [main]
    paths:
      - 'docs/agent-logs/**/*.jsonl'

# Regenerates docs/agent-logs/_index.md after any session log lands on main.

jobs:
  rebuild-index:
    name: Rebuild _index.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/build-log-index.py
      - name: Commit updated index (if changed)
        run: |
          if [ -n "$(git status --porcelain docs/agent-logs/_index.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/agent-logs/_index.md
            git commit -m "chore(logs): rebuild agent-log index [skip ci]"
            git push
          else
            echo "Index already up to date."
          fi
