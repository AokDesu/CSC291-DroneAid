name: droneaid
description: Drone-based relief-supply delivery simulator (CSC291 group project).
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  cloud_functions: ^5.1.3
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true   # enables l10n via app_en.arb
